<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teamder</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">Teamder</div>

      <nav class="menu" id="menu"></nav>
    </header>

    <main class="container">
      <section class="hero">
        <div class="hero-left">
          <h1 class="title">
            팀원을<br />
            찾아보세요
          </h1>

          <p class="subtitle">나와 가장 잘 맞는 팀원을 추천받을 수 있습니다.</p>

          <div id="heroButtons"></div>
        </div>

        <div class="hero-right" id="heroRight"></div>
      </section>

      <section class="feature-section">
        <h2 class="feature-title">주요 기능</h2>

        <div class="project-list">
          <a href="match.html" class="card-link">
            <div class="project-card">
              <div class="project-title">팀원 매칭</div>

              <div class="project-desc">
                관심 분야와 역할을 기반으로 팀원을 추천합니다.
              </div>
            </div>
          </a>

          <a href="liked.html" class="card-link">
            <div class="project-card">
              <div class="project-title">좋아요</div>

              <div class="project-desc">
                마음에 드는 팀원을 저장할 수 있습니다.
              </div>
            </div>
          </a>

          <a href="projects.html" class="card-link">
            <div class="project-card">
              <div class="project-title">프로젝트 모집</div>

              <div class="project-desc">
                프로젝트를 등록하고 팀원을 모집할 수 있습니다.
              </div>
            </div>
          </a>
        </div>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
