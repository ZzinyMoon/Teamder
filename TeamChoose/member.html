<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>팀원 상세정보</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">Teamder</div>

      <nav class="menu">
        <a href="match.html">탐색</a>
        <a href="liked.html">좋아요</a>
        <a href="matches.html">매칭현황</a>
      </nav>
    </header>

    <main class="container">
      <section class="page">
        <div class="match-wrapper">
          <div class="match-card">
            <div class="profile-image" id="profileImage">Profile</div>

            <h1 class="title" id="memberName"></h1>

            <p class="subtitle" id="memberMajor"></p>

            <div class="skill-box" id="skillBox"></div>

            <div class="card">
              <h3>역할</h3>

              <p id="memberRole"></p>
            </div>

            <div class="card">
              <h3>자기소개</h3>

              <p id="memberIntro"></p>
            </div>

            <button class="primary-btn" onclick="likeMember()">좋아요</button>

            <br /><br />

            <button class="secondary-btn" onclick="requestMatchFromDetail()">
              매칭 요청
            </button>

            <br /><br />

            <button class="secondary-btn" onclick="history.back()">
              뒤로가기
            </button>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="index.html"> 홈 </a>

      <a href="match.html" class="active"> 탐색 </a>

      <a href="liked.html"> 좋아요 </a>

      <a href="projects.html"> 프로젝트 </a>

      <a href="mypage.html"> 마이 </a>
    </nav>

    <script type="module" src="js/member.js"></script>
  </body>
</html>
