<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>프로필 설정</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">Teamder</div>
    </header>

    <main class="container">
      <section class="page">
        <h1 class="title">프로필 설정</h1>

        <p class="subtitle">팀원들에게 보여질 정보를 입력해주세요.</p>

        <select id="role" class="input-box">
          <option value="">역할 선택</option>

          <option value="프론트엔드">프론트엔드</option>

          <option value="백엔드">백엔드</option>

          <option value="디자이너">디자이너</option>

          <option value="기획자">기획자</option>

          <option value="영상 편집">영상 편집</option>

          <option value="3D/VFX">3D/VFX</option>
        </select>

        <input type="text" id="major" class="input-box" placeholder="학과" />

        <input
          type="text"
          id="contact"
          class="input-box"
          placeholder="카카오톡 ID 또는 연락처"
        />

        <input
          type="text"
          id="skills"
          class="input-box"
          placeholder="보유 기술 (예: React, Node.js, Blender)"
        />

        <textarea id="intro" class="input-box" rows="6" placeholder="자기소개">
        </textarea>

        <button class="primary-btn" onclick="saveProfile()">저장하기</button>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="index.html"> 홈 </a>

      <a href="match.html"> 탐색 </a>

      <a href="liked.html"> 좋아요 </a>

      <a href="projects.html"> 프로젝트 </a>

      <a href="mypage.html" class="active"> 마이 </a>
    </nav>

    <script type="module" src="js/profile.js"></script>
  </body>
</html>
