<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>역할 선택</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">Teamder</div>

      <nav class="menu">

        <p class="subtitle">프로젝트에서 맡고 싶은 역할을 선택해주세요.</p>

        <div class="select-grid">
          <div class="select-card" onclick="selectRole(this)">

          <div class="select-card" onclick="selectRole(this)">🎬 영상 편집</div>

          <div class="select-card" onclick="selectRole(this)">🧊 3D / VFX</div>
        </div>

        <button class="primary-btn" onclick="saveRole()">다음</button>
      </section>
    </main>

    <script src="js/role.js"></script>
