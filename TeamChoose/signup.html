<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>회원가입</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">Teamder</div>
    </header>

    <main class="container">
      <section class="page">
        <div class="form-box">
          <h1 class="title">회원가입</h1>

          <p class="subtitle">Team Match에 오신 것을 환영합니다.</p>

          <input type="text" id="name" class="input-box" placeholder="이름" />

          <input
            type="email"
            id="email"
            class="input-box"
            placeholder="이메일"
          />

          <input
            type="password"
            id="password"
            class="input-box"
            placeholder="비밀번호"
          />

          <input
            type="password"
            id="confirmPassword"
            class="input-box"
            placeholder="비밀번호 확인"
          />

          <button class="primary-btn" onclick="signup()">회원가입</button>

          <br /><br />

          <a href="login.html"> 이미 계정이 있으신가요? </a>
        </div>
      </section>
    </main>

    <script type="module" src="js/auth.js"></script>
  </body>
</html>
