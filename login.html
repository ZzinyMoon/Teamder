<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>로그인</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">Teamder</div>
    </header>

    <main class="container">
      <section class="page">
        <div class="form-box">
          <h1 class="title">로그인</h1>

          <p class="subtitle">반가워요</p>

          <input
            type="email"
            id="email"
            class="input-box"
            placeholder="이메일"
          />

          <input
            type="password"
            id="password"
            class="input-box"
            placeholder="비밀번호"
          />

          <button class="primary-btn" onclick="login()">로그인</button>

          <br /><br />

          <a href="signup.html"> 회원가입 하기 </a>
        </div>
      </section>
    </main>

    <script type="module" src="js/auth.js"></script>
  </body>
</html>
